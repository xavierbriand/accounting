name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Lint
      run: npm run lint
      
    - name: Run Build
      run: npm run build
      
    - name: Run Tests
      run: npm test

    - name: Run Harness Tests
      run: npm run test:harness

    - name: Drift scan
      run: npx tsx harness/drift-scan/drift-scan.ts
