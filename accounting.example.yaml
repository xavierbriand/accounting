# accounting.example.yaml
# Copy this file to accounting.yaml (git-ignored) and edit it with your own values.
#
# The real accounting.yaml contains household data (partner names, account paths,
# financial targets) and must never be committed to version control.

# Path to the SQLite database file, relative to the project root.
dbPath: ./data/ledger.db

# ISO 4217 three-letter currency code used for all monetary amounts in this file.
defaultCurrency: EUR

# IANA timezone for normalising date-only bank data into ISO 8601 with offset.
# The parser converts e.g. 20/04/2026 to 2026-04-20T00:00:00+02:00 in Europe/Paris (CEST).
# DST transitions are handled per-date, so April dates resolve to +02:00 and January to +01:00.
timezone: Europe/Paris

# Account identifiers and filename-prefix matching rules.
# `accounting ingest -f <file.csv>` will read each file, find the account whose
# filenamePrefix is a prefix of the file's basename, and tag every parsed
# transaction with that account's `id`.
# Prefixes must be unique so a file matches at most one account.
accounts:
  - id: main-12345678901
    type: bank
    filenamePrefix: "12345678901_"
  - id: card-1234
    type: card
    cardSuffix: "1234"
    filenamePrefix: "carte_1234_"

# Split rules: who pays what share of shared expenses.
# Each window has a validFrom date (YYYY-MM-DD) and a list of partner/ratio rules.
# Windows must be in strictly ascending validFrom order. The last window has no end date.
# Each window's ratios must sum exactly to 1.0. All windows must declare the same partners.
# At least two partners per window (couples-app constraint).
splits:
  - validFrom: "2024-01-01"
    rules:
      - { partner: Alex, ratio: 0.5 }
      - { partner: Sam,  ratio: 0.5 }

# Buffer buckets: target balances you want to maintain for specific goals.
# account: ledger account string for this bucket (must be unique across all buffers).
# target:  the minimum balance to maintain (required, non-negative decimal).
# cap:     the maximum to accumulate (optional; must be >= target if provided).
# Amounts are in the defaultCurrency above.
# An empty list is valid if you have no buffer targets yet.
buffers:
  - name: Car
    account: assets:buffer:car
    target: 1000
    targetDate: "2099-12-31"
  - name: House
    account: assets:buffer:house
    target: 5000
    cap: 10000
    targetDate: "2099-12-31"

# Recurring costs: fixed expenses that hit joint accounts on a predictable cadence.
# Used by RecurringForecastService to project upcoming expenses over a date window.
#
# cadence: monthly | quarterly | annual
# amount:  positive decimal in defaultCurrency (EUR above)
# validFrom: ISO 8601 date (YYYY-MM-DD) — when this rule's lifecycle begins
# validTo:   optional ISO date — inclusive end date (omit for open-ended rules)
# amendments: optional list of amount changes (strictly ascending validFrom,
#             first amendment must be strictly after rule validFrom,
#             last amendment validFrom must be <= validTo when validTo is set)
#
# An empty list is valid if you have no recurring costs configured yet.
recurring:
  - name: Netflix
    category: Subscriptions
    cadence: monthly
    amount: 12.99
    validFrom: "2024-01-01"
  - name: Rent
    category: Rent
    cadence: monthly
    amount: 1000
    validFrom: "2024-01-01"
    amendments:
      - validFrom: "2026-07-01"
        amount: 1050

# Auto-tag rules: automatically categorise transactions by matching their description
# against the patterns below (case-insensitive regex, first match wins).
# Add, remove or adjust rules to match your bank's description format.
# Each category name follows the same rules as inline-defined categories
# (max 64 chars, no ':', '/', '\', not a reserved token like Uncategorized/Asset/Income/Expense/Liability).
# If no rule matches, the transaction is tagged Uncategorized and flagged for manual review.
# An empty list is valid; every transaction will be Uncategorized until rules are added.
autoTagRules:
  - category: Transport
    patterns:
      - "uber|bolt|taxi|freenow"
  - category: Groceries
    patterns:
      - "carrefour|monoprix|auchan|intermarche|biocoop|leclerc"
  - category: Fuel
    patterns:
      - "total|shell|bp|esso|station service"
  - category: Restaurant
    patterns:
      - "restaurant|cafe|bar|brasserie|snack"
  - category: Utilities
    patterns:
      - "edf|engie|veolia|orange|sfr|free|bouygues"
  - category: BankingFees
    patterns:
      - "cotisation|frais bancaires|agios"
  - category: Insurance
    patterns:
      - "assurance|mutuelle"
  - category: Subscriptions
    patterns:
      - "netflix|spotify|prime|disney|apple\\.com|abonnement"
